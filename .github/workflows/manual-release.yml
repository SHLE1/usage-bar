name: Manual Unsigned Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Exact version number to publish (for example 0.0.8). Leave empty to bump automatically.'
        required: false
        type: string
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: macos-14

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Latest Tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST_TAG"

      - name: Resolve Release Version
        id: release_version
        run: |
          INPUT_VERSION="${{ inputs.release_version }}"
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION_NUMBER="${INPUT_VERSION#v}"
            VERSION_TAG="v${VERSION_NUMBER}"
          else
            VERSION="${LATEST#v}"

            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            case "${{ inputs.version_bump }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            VERSION_NUMBER="${MAJOR}.${MINOR}.${PATCH}"
            VERSION_TAG="v${VERSION_NUMBER}"
          fi

          if git rev-parse "${VERSION_TAG}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -Fxv "${VERSION_TAG}" | head -n 1 || true)
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG="$LATEST"
          fi

          echo "new_version=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "version_number=$VERSION_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION_TAG"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Update Version Files
        run: |
          VERSION="${{ steps.release_version.outputs.version_number }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" CopilotMonitor/CopilotMonitor/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" CopilotMonitor/CopilotMonitor/Info.plist
          perl -0pi -e 's/UsageBar v\d+\.\d+\.\d+/UsageBar v'"$VERSION"'/g' README.md README.zh-CN.md

      - name: Build Unsigned Archive
        run: |
          cd CopilotMonitor
          xcodebuild -project CopilotMonitor.xcodeproj \
            -scheme CopilotMonitor \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath build/CopilotMonitor.xcarchive \
            archive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          mkdir -p CopilotMonitor/build/export
          cp -R "CopilotMonitor/build/CopilotMonitor.xcarchive/Products/Applications/UsageBar.app" CopilotMonitor/build/export/

      - name: Verify Universal Binary
        run: |
          APP_PATH="CopilotMonitor/build/export/UsageBar.app"
          MAIN_BIN="$APP_PATH/Contents/MacOS/UsageBar"
          CLI_BIN="$APP_PATH/Contents/MacOS/usagebar-cli"

          echo "Main binary architectures: $(lipo -archs "$MAIN_BIN")"
          if ! lipo -archs "$MAIN_BIN" | grep -q "x86_64"; then
            echo "Missing x86_64 slice in main binary"
            exit 1
          fi
          if ! lipo -archs "$MAIN_BIN" | grep -q "arm64"; then
            echo "Missing arm64 slice in main binary"
            exit 1
          fi

          if [ ! -f "$CLI_BIN" ]; then
            echo "CLI binary not found at $CLI_BIN"
            exit 1
          fi

          echo "CLI binary architectures: $(lipo -archs "$CLI_BIN")"
          if ! lipo -archs "$CLI_BIN" | grep -q "x86_64"; then
            echo "Missing x86_64 slice in CLI binary"
            exit 1
          fi
          if ! lipo -archs "$CLI_BIN" | grep -q "arm64"; then
            echo "Missing arm64 slice in CLI binary"
            exit 1
          fi

      - name: Create Unsigned ZIP and DMG
        id: package
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.new_version }}"
          DIST_DIR="$RUNNER_TEMP/release-dist"
          APP_PATH="CopilotMonitor/build/export/UsageBar.app"
          ZIP_NAME="UsageBar-${VERSION_TAG}-unsigned.zip"
          DMG_NAME="UsageBar-${VERSION_TAG}-unsigned.dmg"
          DMG_STAGING="$RUNNER_TEMP/dmg_staging"

          mkdir -p "$DIST_DIR"
          ditto -c -k --keepParent "$APP_PATH" "$DIST_DIR/$ZIP_NAME"

          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create -volname "UsageBar" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$DIST_DIR/$DMG_NAME"

          rm -rf "$DMG_STAGING"

          ZIP_SHA=$(shasum -a 256 "$DIST_DIR/$ZIP_NAME" | awk '{print $1}')
          DMG_SHA=$(shasum -a 256 "$DIST_DIR/$DMG_NAME" | awk '{print $1}')

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_sha=$ZIP_SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_sha=$DMG_SHA" >> "$GITHUB_OUTPUT"

      - name: Create Release Notes File
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.new_version }}"
          VERSION_NUMBER="${{ steps.release_version.outputs.version_number }}"
          TAG_EXISTS="${{ steps.release_version.outputs.tag_exists }}"
          PREVIOUS_TAG="${{ steps.release_version.outputs.previous_tag }}"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          DMG_NAME="${{ steps.package.outputs.dmg_name }}"
          ZIP_SHA="${{ steps.package.outputs.zip_sha }}"
          DMG_SHA="${{ steps.package.outputs.dmg_sha }}"

          if [ "$TAG_EXISTS" = "true" ]; then
            VERSION_LINE="- Rebuild release artifacts for \`$VERSION_NUMBER\` with GitHub Actions."
          else
            VERSION_LINE="- Bump app version to \`$VERSION_NUMBER\`."
          fi

          printf '%s\n' \
            '## Release Notes' \
            '' \
            "$VERSION_LINE" \
            '- Publish unsigned `zip` and `dmg` artifacts.' \
            '- Update the Homebrew tap to the same version.' \
            '' \
            '## Artifacts' \
            "- \`$ZIP_NAME\`" \
            "  - SHA256: \`$ZIP_SHA\`" \
            "- \`$DMG_NAME\`" \
            "  - SHA256: \`$DMG_SHA\`" \
            '' \
            '## Notice' \
            'These artifacts are unsigned and not notarized, so macOS Gatekeeper may require manual override before opening.' \
            '' \
            'After moving the app to Applications, run:' \
            '' \
            '```bash' \
            'xattr -cr "/Applications/UsageBar.app"' \
            '```' \
            '' \
            "**Full Changelog**: https://github.com/SHLE1/usage-bar/compare/${PREVIOUS_TAG}...$VERSION_TAG" \
            > "$RUNNER_TEMP/release-notes.md"

          cat "$RUNNER_TEMP/release-notes.md"

      - name: Commit Version Bump and Create Tag
        if: steps.release_version.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CopilotMonitor/CopilotMonitor/Info.plist README.md README.zh-CN.md
          git commit -m "chore: bump version to ${{ steps.release_version.outputs.version_number }}"
          git tag "${{ steps.release_version.outputs.new_version }}"
          git push origin HEAD:main --follow-tags

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.new_version }}"
          ZIP_PATH="${{ runner.temp }}/release-dist/${{ steps.package.outputs.zip_name }}"
          DMG_PATH="${{ runner.temp }}/release-dist/${{ steps.package.outputs.dmg_name }}"
          RELEASE_NAME="UsageBar ${VERSION_TAG}"
          NOTES_FILE="${{ runner.temp }}/release-notes.md"

          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            gh release upload "$VERSION_TAG" "$DMG_PATH" "$ZIP_PATH" --clobber
            gh release edit "$VERSION_TAG" --title "$RELEASE_NAME" --notes-file "$NOTES_FILE"
          else
            CREATE_ARGS=()
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              CREATE_ARGS+=(--prerelease)
            fi
            gh release create "$VERSION_TAG" "$DMG_PATH" "$ZIP_PATH" \
              --title "$RELEASE_NAME" \
              --notes-file "$NOTES_FILE" \
              "${CREATE_ARGS[@]}"
          fi

      - name: Update Homebrew Tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.new_version }}"
          VERSION_NUMBER="${{ steps.release_version.outputs.version_number }}"
          DMG_NAME="${{ steps.package.outputs.dmg_name }}"
          DMG_SHA="${{ steps.package.outputs.dmg_sha }}"

          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not set. Failing because tap update is required."
            exit 1
          fi

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/SHLE1/homebrew-tap.git" tap-repo
          export VERSION_NUMBER
          export DMG_NAME
          export DMG_SHA
          ruby -e '
            file = "tap-repo/Casks/usage-bar.rb"
            content = File.read(file)
            version = ENV.fetch("VERSION_NUMBER")
            dmg_name = ENV.fetch("DMG_NAME")
            sha = ENV.fetch("DMG_SHA")
            content.gsub!(/version ".*"/, "version \"#{version}\"")
            content.gsub!(/sha256 ".*"/, "sha256 \"#{sha}\"")
            content.gsub!(%r{url ".*"}, "url \"https://github.com/SHLE1/usage-bar/releases/download/v#{version}/#{dmg_name}\"")
            File.write(file, content)
          '

          git -C tap-repo config user.name "github-actions[bot]"
          git -C tap-repo config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap-repo add Casks/usage-bar.rb
          if git -C tap-repo diff --cached --quiet; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi
          git -C tap-repo commit -m "chore: update UsageBar cask to v${VERSION_NUMBER}"
          git -C tap-repo push origin HEAD

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UsageBar-${{ steps.release_version.outputs.new_version }}-unsigned
          path: |
            ${{ runner.temp }}/release-dist/*.zip
            ${{ runner.temp }}/release-dist/*.dmg
            ${{ runner.temp }}/release-notes.md
          retention-days: 30
