name: Manual Unsigned Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Exact version number to publish (for example 0.0.8). Leave empty to bump automatically.'
        required: false
        type: string
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: macos-26

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Latest Tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST_TAG"

      - name: Resolve Release Version
        id: release_version
        run: |
          INPUT_VERSION="${{ inputs.release_version }}"
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION_NUMBER="${INPUT_VERSION#v}"
            VERSION_TAG="v${VERSION_NUMBER}"
          else
            CURRENT_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

            case "${{ inputs.version_bump }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            VERSION_NUMBER="${MAJOR}.${MINOR}.${PATCH}"
            VERSION_TAG="v${VERSION_NUMBER}"
          fi

          if git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -Fxv "${VERSION_TAG}" | head -n 1 || true)
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG="$LATEST_TAG"
          fi

          {
            echo "version_tag=$VERSION_TAG"
            echo "version_number=$VERSION_NUMBER"
            echo "tag_exists=$TAG_EXISTS"
            echo "previous_tag=$PREVIOUS_TAG"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION_TAG"

      - name: Checkout Existing Release Source
        if: steps.release_version.outputs.tag_exists == 'true'
        run: |
          git checkout "${{ steps.release_version.outputs.version_tag }}"
          echo "Checked out existing tag: ${{ steps.release_version.outputs.version_tag }}"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Update Version Files
        run: |
          VERSION="${{ steps.release_version.outputs.version_number }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" UsageBar/UsageBar/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" UsageBar/UsageBar/Info.plist
          perl -0pi -e 's/UsageBar v\d+\.\d+\.\d+/UsageBar v'"$VERSION"'/g' README.md README.zh-CN.md

      - name: Build Unsigned Archive
        run: |
          cd UsageBar
          xcodebuild -project UsageBar.xcodeproj \
            -scheme UsageBar \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath build/UsageBar.xcarchive \
            archive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          mkdir -p UsageBar/build/export
          cp -R "UsageBar/build/UsageBar.xcarchive/Products/Applications/UsageBar.app" UsageBar/build/export/

      - name: Verify Universal Binary
        run: |
          APP_PATH="UsageBar/build/export/UsageBar.app"
          MAIN_BIN="$APP_PATH/Contents/MacOS/UsageBar"
          CLI_BIN="$APP_PATH/Contents/MacOS/usagebar-cli"

          echo "Main binary architectures: $(lipo -archs "$MAIN_BIN")"
          if ! lipo -archs "$MAIN_BIN" | grep -q "x86_64"; then
            echo "Missing x86_64 slice in main binary"
            exit 1
          fi
          if ! lipo -archs "$MAIN_BIN" | grep -q "arm64"; then
            echo "Missing arm64 slice in main binary"
            exit 1
          fi

          if [ ! -f "$CLI_BIN" ]; then
            echo "CLI binary not found at $CLI_BIN"
            exit 1
          fi

          echo "CLI binary architectures: $(lipo -archs "$CLI_BIN")"
          if ! lipo -archs "$CLI_BIN" | grep -q "x86_64"; then
            echo "Missing x86_64 slice in CLI binary"
            exit 1
          fi
          if ! lipo -archs "$CLI_BIN" | grep -q "arm64"; then
            echo "Missing arm64 slice in CLI binary"
            exit 1
          fi

      - name: Create Unsigned ZIP and DMG
        id: package
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.version_tag }}"
          DIST_DIR="$RUNNER_TEMP/release-dist"
          APP_PATH="UsageBar/build/export/UsageBar.app"
          ZIP_NAME="UsageBar-${VERSION_TAG}-unsigned.zip"
          DMG_NAME="UsageBar-${VERSION_TAG}-unsigned.dmg"
          DMG_STAGING="$RUNNER_TEMP/dmg_staging"

          mkdir -p "$DIST_DIR"
          ditto -c -k --keepParent "$APP_PATH" "$DIST_DIR/$ZIP_NAME"

          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create -volname "UsageBar" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$DIST_DIR/$DMG_NAME"

          rm -rf "$DMG_STAGING"

          ZIP_SHA=$(shasum -a 256 "$DIST_DIR/$ZIP_NAME" | awk '{print $1}')
          DMG_SHA=$(shasum -a 256 "$DIST_DIR/$DMG_NAME" | awk '{print $1}')

          {
            echo "zip_name=$ZIP_NAME"
            echo "dmg_name=$DMG_NAME"
            echo "zip_sha=$ZIP_SHA"
            echo "dmg_sha=$DMG_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Locate Sparkle Tools
        id: sparkle_tools
        run: |
          SIGN_UPDATE=$(find "$HOME/Library/Developer/Xcode/DerivedData" \
            -path '*/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update' \
            -type f \
            | head -n 1)

          if [ -z "$SIGN_UPDATE" ]; then
            echo "Sparkle sign_update tool was not found in DerivedData."
            exit 1
          fi

          echo "sign_update=$SIGN_UPDATE" >> "$GITHUB_OUTPUT"
          echo "Found Sparkle sign_update tool."

      - name: Create Sparkle Appcast
        id: appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "SPARKLE_ED_PRIVATE_KEY is not set. Add the Sparkle EdDSA private key as a GitHub Actions secret."
            exit 1
          fi

          VERSION_TAG="${{ steps.release_version.outputs.version_tag }}"
          VERSION_NUMBER="${{ steps.release_version.outputs.version_number }}"
          DIST_DIR="$RUNNER_TEMP/release-dist"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          ZIP_PATH="$DIST_DIR/$ZIP_NAME"
          APPCAST_PATH="$DIST_DIR/appcast.xml"
          SIGN_UPDATE="${{ steps.sparkle_tools.outputs.sign_update }}"
          RELEASE_NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION_TAG"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$VERSION_TAG/$ZIP_NAME"
          PUB_DATE=$(LC_ALL=C TZ=UTC date -R)

          SIGN_OUTPUT=$(printf '%s\n' "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP_PATH")
          ED_SIGNATURE=$(printf '%s\n' "$SIGN_OUTPUT" | sed -nE 's/.*sparkle:edSignature="([^"]+)".*/\1/p')
          ZIP_LENGTH=$(printf '%s\n' "$SIGN_OUTPUT" | sed -nE 's/.*(sparkle:)?length="([^"]+)".*/\2/p')

          if [ -z "$ED_SIGNATURE" ] || [ -z "$ZIP_LENGTH" ]; then
            echo "Failed to parse Sparkle signature output:"
            printf '%s\n' "$SIGN_OUTPUT"
            exit 1
          fi

          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">' \
            '  <channel>' \
            '    <title>UsageBar Updates</title>' \
            '    <description>UsageBar release updates</description>' \
            '    <language>en</language>' \
            "    <link>https://github.com/${{ github.repository }}/releases</link>" \
            '    <item>' \
            "      <title>UsageBar $VERSION_TAG</title>" \
            "      <sparkle:version>$VERSION_NUMBER</sparkle:version>" \
            "      <sparkle:shortVersionString>$VERSION_NUMBER</sparkle:shortVersionString>" \
            '      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>' \
            "      <pubDate>$PUB_DATE</pubDate>" \
            "      <sparkle:releaseNotesLink>$RELEASE_NOTES_URL</sparkle:releaseNotesLink>" \
            "      <enclosure url=\"$DOWNLOAD_URL\" sparkle:edSignature=\"$ED_SIGNATURE\" length=\"$ZIP_LENGTH\" type=\"application/octet-stream\" />" \
            '    </item>' \
            '  </channel>' \
            '</rss>' \
            > "$APPCAST_PATH"

          xmllint --noout "$APPCAST_PATH"
          echo "appcast_path=$APPCAST_PATH" >> "$GITHUB_OUTPUT"
          echo "appcast_name=appcast.xml" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes Body
        id: generated_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.version_tag }}"
          PREVIOUS_TAG="${{ steps.release_version.outputs.previous_tag }}"

          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$VERSION_TAG" \
            -f target_commitish="${{ github.sha }}" \
            -f previous_tag_name="$PREVIOUS_TAG" \
            --jq '.body' > "$RUNNER_TEMP/generated-release-notes-body.md"

          cat "$RUNNER_TEMP/generated-release-notes-body.md"

      - name: Create Release Notes File
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.version_tag }}"
          PREVIOUS_TAG="${{ steps.release_version.outputs.previous_tag }}"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          DMG_NAME="${{ steps.package.outputs.dmg_name }}"
          APPCAST_NAME="${{ steps.appcast.outputs.appcast_name }}"
          ZIP_SHA="${{ steps.package.outputs.zip_sha }}"
          DMG_SHA="${{ steps.package.outputs.dmg_sha }}"
          GENERATED_BODY_FILE="$RUNNER_TEMP/generated-release-notes-body.md"

          cp "$GENERATED_BODY_FILE" "$RUNNER_TEMP/release-notes.md"

          {
            printf '\n%s\n' '## Artifacts'
            printf '%s\n' "- \`$ZIP_NAME\`"
            printf '%s\n' "  - SHA256: \`$ZIP_SHA\`"
            printf '%s\n' "- \`$DMG_NAME\`"
            printf '%s\n' "  - SHA256: \`$DMG_SHA\`"
            printf '%s\n' "- \`$APPCAST_NAME\`"
            printf '%s\n' '  - Sparkle update feed used by Check for Updates...'
            printf '\n%s\n' '## Notice'
            printf '%s\n' 'These artifacts are unsigned and not notarized, so macOS Gatekeeper may require manual override before opening.'
            printf '\n%s\n' 'After moving the app to Applications, run:'
            printf '%s\n' '```bash'
            printf '%s\n' 'xattr -cr "/Applications/UsageBar.app"'
            printf '%s\n' '```'
            printf '\n%s\n' "**Full Changelog**: https://github.com/SHLE1/usage-bar/compare/${PREVIOUS_TAG}...$VERSION_TAG"
          } >> "$RUNNER_TEMP/release-notes.md"

          cat "$RUNNER_TEMP/release-notes.md"

      - name: Commit Version Bump and Create Tag
        if: steps.release_version.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add UsageBar/UsageBar/Info.plist README.md README.zh-CN.md
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.release_version.outputs.version_number }}"
          git tag "${{ steps.release_version.outputs.version_tag }}"
          git push origin HEAD:main "${{ steps.release_version.outputs.version_tag }}"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="${{ steps.release_version.outputs.version_tag }}"
          ZIP_PATH="${{ runner.temp }}/release-dist/${{ steps.package.outputs.zip_name }}"
          DMG_PATH="${{ runner.temp }}/release-dist/${{ steps.package.outputs.dmg_name }}"
          APPCAST_PATH="${{ steps.appcast.outputs.appcast_path }}"
          RELEASE_NAME="UsageBar ${VERSION_TAG}"
          NOTES_FILE="${{ runner.temp }}/release-notes.md"

          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            gh release upload "$VERSION_TAG" "$DMG_PATH" "$ZIP_PATH" "$APPCAST_PATH" --clobber
            gh release edit "$VERSION_TAG" --title "$RELEASE_NAME" --notes-file "$NOTES_FILE"
          else
            CREATE_ARGS=()
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              CREATE_ARGS+=(--prerelease)
            fi
            gh release create "$VERSION_TAG" "$DMG_PATH" "$ZIP_PATH" "$APPCAST_PATH" \
              --title "$RELEASE_NAME" \
              --notes-file "$NOTES_FILE" \
              "${CREATE_ARGS[@]}"
          fi

      - name: Update Homebrew Tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION_NUMBER="${{ steps.release_version.outputs.version_number }}"
          DMG_NAME="${{ steps.package.outputs.dmg_name }}"
          DMG_SHA="${{ steps.package.outputs.dmg_sha }}"

          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not set. Failing because tap update is required."
            exit 1
          fi

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/SHLE1/homebrew-tap.git" tap-repo
          export VERSION_NUMBER
          export DMG_NAME
          export DMG_SHA
          ruby -e '
            file = "tap-repo/Casks/usage-bar.rb"
            content = File.read(file)
            version = ENV.fetch("VERSION_NUMBER")
            dmg_name = ENV.fetch("DMG_NAME")
            sha = ENV.fetch("DMG_SHA")
            content.gsub!(/version ".*"/, "version \"#{version}\"")
            content.gsub!(/sha256 ".*"/, "sha256 \"#{sha}\"")
            content.gsub!(%r{url ".*"}, "url \"https://github.com/SHLE1/usage-bar/releases/download/v#{version}/#{dmg_name}\"")
            File.write(file, content)
          '

          git -C tap-repo config user.name "github-actions[bot]"
          git -C tap-repo config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap-repo add Casks/usage-bar.rb
          if git -C tap-repo diff --cached --quiet; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi
          git -C tap-repo commit -m "chore: update UsageBar cask to v${VERSION_NUMBER}"
          git -C tap-repo push origin HEAD

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UsageBar-${{ steps.release_version.outputs.version_tag }}-unsigned
          path: |
            ${{ runner.temp }}/release-dist/*.zip
            ${{ runner.temp }}/release-dist/*.dmg
            ${{ runner.temp }}/release-dist/appcast.xml
            ${{ runner.temp }}/release-notes.md
          retention-days: 30
