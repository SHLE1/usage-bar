name: Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.swift'
      - '**.xcodeproj/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.swift'
      - '**.xcodeproj/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-26
    env:
      XCODE_VERSION: '26.4'
      PROJECT_FILE: CopilotMonitor.xcodeproj
      SCHEME: CopilotMonitor
    defaults:
      run:
        working-directory: CopilotMonitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME"

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Test (Debug)
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions
