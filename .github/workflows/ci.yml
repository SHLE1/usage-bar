name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    defaults:
      run:
        working-directory: CopilotMonitor/CopilotMonitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging
        continue-on-error: true

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install actionlint
        run: |
          curl -sL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz | tar xzv -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/
      
      - name: Run actionlint
        run: actionlint -color

  build:
    name: Build
    runs-on: macos-26
    needs: [lint, actionlint]
    env:
      XCODE_VERSION: '26.4'
      PROJECT_FILE: CopilotMonitor.xcodeproj
      SCHEME: CopilotMonitor
    defaults:
      run:
        working-directory: CopilotMonitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME"

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build (Release)
        run: |
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
